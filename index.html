<!DOCTYPE html>
<html lang="es">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax ejercicio Alumnos</title>
    
    <style>
    body {
        margin: 0;
        background-color: #f3f3f3;
    }

    img {
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    #parallax-container {
        position: relative;
        height: 100vh;
        overflow: hidden;
        z-index: 10;
    }

    #layer1 {
        position: absolute;
        z-index: 1;
        background-image: url('imagenes/atardecer.jpg');
        top: 0; 
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    #layer2 {
        z-index: 2;
        position: absolute; 
        top: 0px;
        left: 50px;
        width: 100px;
        height: auto;
    }

    #layer3 {
        z-index: 3;
        position: absolute; 
        top: 300px;
        left: 200px;
        width: 150px;
    }

    #layer4 {
        position: absolute;
        z-index: 4;
        top: 50px;
        left: 400px;
        width: 200px;
    }

    .completo {
        width: 100%;
        height: auto;
        object-fit: contain;
    }

    .contenido {
        padding: 50px 20px;
        background-color: #cacccd;
        text-align: center;
        min-height: 1500px; 
        position: relative;
        z-index: 1;
    }
</style>
</head>
 
<body>
 
    <div id="parallax-container">
 
        <div id="layer1"></div>
 
        <div id="layer2">
            <img src="imagenes/Carro.png">
        </div>
 
        <div id="layer3">
            <img class="completo" src="imagenes/mujer_npc.png">
        </div>
 
        <div id="layer4">
            <img class="completo" src="imagenes/hombre_npc.png">
        </div>
 
    </div>
 
    <section class="contenido">
        
    </section>
 
    <script>
        document.addEventListener('DOMContentLoaded', function () {

    const layer1 = document.getElementById('layer1');
    const layer2 = document.getElementById('layer2');
    const layer3 = document.getElementById('layer3');
    const layer4 = document.getElementById('layer4');
    const container = document.getElementById('parallax-container');

    // Velocidades
    const speed1 = 0.6;
    const speed2 = 0.4;
    const speed3 = 0.2;
    const speed4 = 0.1;

    function updateParallax() {

        const scrollOffset = window.scrollY;

        layer1.style.transform = `translate3d(0, ${scrollOffset * speed1}px, 0)`;
        layer2.style.transform = `translate3d(0, ${scrollOffset * speed2}px, 0)`;
        layer3.style.transform = `translate3d(0, ${scrollOffset * speed3}px, 0)`;
        layer4.style.transform = `translate3d(0, ${scrollOffset * speed4}px, 0)`;
    }

    window.addEventListener('scroll', updateParallax);

    updateParallax();
});
    </script>
</body>
 
</html>
